<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CBB Prediction Model</title>
  <style>
    body{font-family:Arial;background:#f4f6f8;margin:0;padding:32px}
    .card{background:#fff;border-radius:12px;padding:20px;max-width:900px;box-shadow:0 6px 20px rgba(0,0,0,.08)}
    pre{white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
  <h1>CBB Prediction Model</h1>
  <div class="card">
    <pre id="data">Loading predictions...</pre>
  </div>

  <script>
    fetch("/output/today_predictions.json", { cache: "no-store" })
      .then(r => r.json())
      .then(data => {
        document.getElementById("data").textContent = JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById("data").textContent =
          "Error loading /output/today_predictions.json\n\n" + err;
      });
  </script>
</body>
</html>
